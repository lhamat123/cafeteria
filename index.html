<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Café Roble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lb" onclick="lbBg(event)">
  <button id="lb-close" onclick="lbClose()">✕</button>
  <button id="lb-prev" onclick="lbNav(-1);event.stopPropagation()">&#8249;</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-cap"></div>
  <button id="lb-next" onclick="lbNav(1);event.stopPropagation()">&#8250;</button>
  <span id="lb-ctr"></span>
</div>

<!-- ADMIN FLOATING BUTTON -->
<button id="adminBtn" onclick="goAdmin()">⚙ Administrar</button>

<!-- ══════════ MENU PAGE ══════════ -->
<div class="page active" id="page-menu">
  <a class="banner" href="#" onclick="goPage('info');return false">
    <img class="banner-photo" src="" alt="Café Roble"/>
    <div class="banner-body">
      <span class="banner-name">Café Roble</span>
      <span class="banner-sub"></span>
    </div>
    <div class="banner-action">
      <span class="banner-action-icon">ℹ️</span>
      <span class="banner-action-label">Nosotros</span>
    </div>
  </a>
  <nav class="cat-nav-wrap"><div class="cat-nav" id="catNav"></div></nav>
  <p class="swipe-hint" id="swipeHint">← arrastra para cambiar categoría →</p>
  <div class="slider-vp" id="viewport"><div class="slider-track" id="track"></div></div>
  <footer>
    <p class="footer-main"></p>
    <p class="footer-sub"></p>
  </footer>
</div>

<!-- ══════════ INFO PAGE ══════════ -->
<div class="page" id="page-info">
  <a class="banner" href="#" onclick="goPage('menu');return false">
    <img class="banner-photo" src="" alt="Café Roble"/>
    <div class="banner-body">
      <span class="banner-name">Café Roble</span>
      <span class="banner-sub"></span>
    </div>
    <div class="banner-action">
      <span class="banner-action-icon">📋</span>
      <span class="banner-action-label">Carta</span>
    </div>
  </a>
  <div class="info-wrap">
    <h2 class="info-sec">⭐ Oferta del mes</h2>
    <div class="promo" id="promoBlock"></div>

    <h2 class="info-sec">🫘 Nuestra historia</h2>
    <div class="about-grid">
      <img class="about-img" id="aboutImg" src="" alt="Interior"/>
      <div class="about-text">
        <span class="about-badge" id="aboutBadge"></span>
        <h3 id="aboutTitulo"></h3>
        <p id="aboutP1"></p>
        <p id="aboutP2"></p>
      </div>
    </div>

    <h2 class="info-sec">📞 Contacto</h2>
    <div class="cg" id="contactBlock"></div>

    <h2 class="info-sec">🕐 Horarios</h2>
    <div class="hg" id="horariosBlock"></div>

    <h2 class="info-sec">✨ Destacados</h2>
    <div class="feat-grid" id="infoFeat"></div>

    <h2 class="info-sec">📸 Galería</h2>
    <div class="info-gal" id="infoGal"></div>

    <h2 class="info-sec">📍 Ubicación</h2>
    <div class="map-card">
      <iframe class="map-frame" id="mapFrame" src="" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <div class="map-info">
        <div class="map-addr" id="mapAddr"></div>
        <a class="map-lnk" id="mapLink" href="#" target="_blank">Abrir en Maps →</a>
      </div>
    </div>
  </div>
  <footer>
    <p class="footer-main"></p>
    <p class="footer-sub"></p>
  </footer>
</div>

<!-- ══════════ ADMIN PAGE ══════════ -->
<div class="page" id="page-admin">

  <!-- BARRA SUPERIOR -->
  <div class="adm-bar">
    <span class="adm-bar-title">⚙️ Administración — Café Roble</span>
    <button class="ab ab-ghost" onclick="goPage('menu')">← Salir</button>
    <button class="ab ab-green" onclick="admApply()">✔ Guardar y aplicar</button>
    <button class="ab ab-gold" onclick="admExport()">⬇ Exportar JSON</button>
    <label class="ab ab-blue" style="cursor:pointer">
      📂 Importar JSON
      <input type="file" accept=".json" style="display:none" onchange="admImport(this)"/>
    </label>
    <button class="ab ab-red" onclick="admReset()">↺ Restablecer</button>
  </div>

  <div class="adm-body">

    <!-- NAVEGACIÓN DE SECCIONES -->
    <div class="adm-section-nav">
      <button class="asec-btn active" data-sec="menu"       onclick="switchSection('menu')">🛍 Menú y galería</button>
      <button class="asec-btn"        data-sec="negocio"    onclick="switchSection('negocio')">🏪 Datos del negocio</button>
      <button class="asec-btn"        data-sec="categorias" onclick="switchSection('categorias')">📂 Categorías</button>
    </div>

    <!-- SECCIÓN: MENÚ -->
    <div class="adm-section active" id="adm-sec-menu">
      <div class="adm-tabs" id="admTabs"></div>
      <div id="admContent"></div>
    </div>

    <!-- SECCIÓN: NEGOCIO -->
    <div class="adm-section" id="adm-sec-negocio">
      <div id="adm-negocio-content"></div>
    </div>

    <!-- SECCIÓN: CATEGORÍAS -->
    <div class="adm-section" id="adm-sec-categorias">
      <div id="adm-cat-content"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
